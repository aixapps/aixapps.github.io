<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Cast Receiver (Shaka)</title>

  <!--
    Custom Web Receiver for CastTry — drives Shaka Player DIRECTLY (like our TV-browser
    players) instead of relying on CAF's built-in useShakaForHls, which won't combine
    DEMUXED multi-audio HLS (separate audio-group renditions). Verified on-device:
      muxed HLS  → CAF built-in plays it
      demuxed HLS→ CAF built-in fails (LOAD_FAILED / timeout)  ← this file fixes that
    Hybrid routing: Shaka for .m3u8/.mpd, native <video> for progressive (mp4/webm/…).
    Registered against app id 9BDEDD6A. Hosted on GitHub Pages (HTTPS).
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11/dist/shaka-player.compiled.js"></script>

  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #vid { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; object-fit: contain; }
    #dbg {
      position: absolute; left: 0; top: 0; z-index: 9999;
      max-width: 62vw; max-height: 100vh; box-sizing: border-box;
      padding: 12px 16px; margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-size: 1.6vh; line-height: 1.45;
      color: #b8f0c0; background: rgba(0,0,0,.55);
      white-space: pre-wrap; word-break: break-word; pointer-events: none;
    }
    #dbg .hd { color: #7fd0ff; font-weight: bold; }
    #dbg .st { color: #ffe08a; }
    #dbg .err{ color: #ff8a8a; }
    #dbg.off { display: none; }
  </style>
</head>
<body>
  <video id="vid" autoplay playsinline></video>
  <pre id="dbg"><span class="hd">Cast Receiver — booting…</span></pre>

  <script>
  (function () {
    'use strict';
    const NS = 'urn:x-cast:com.casttry.cast';
    const dbgEl = document.getElementById('dbg');
    const video = document.getElementById('vid');
    const lines = []; let statusLine = ''; let debugOn = true;

    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function render(){
      dbgEl.className = debugOn ? '' : 'off';
      dbgEl.innerHTML = '<span class="hd">Cast Receiver (Shaka)</span>\n' +
        (statusLine ? '<span class="st">'+statusLine+'</span>\n' : '') + lines.join('\n');
    }
    function log(msg, cls){
      const t = new Date().toISOString().substr(11,8);
      lines.push((cls?'<span class="'+cls+'">':'<span>') + t + '  ' + esc(msg) + '</span>');
      while (lines.length > 22) lines.shift();
      render(); try { console.log('[Receiver] '+msg); } catch(e){}
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const pm = context.getPlayerManager();
    const M = cast.framework.messages, MT = M.MessageType, TT = M.TrackType, TX = M.TextTrackType;
    function toSenders(o){ try { context.sendCustomMessage(NS, undefined, o); } catch(e){} }
    try { context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG); } catch(e){}

    // ── Shaka ────────────────────────────────────────────────────────────────
    let player = null, attached = false, usingShaka = false;
    let audioList = [], textList = [];        // discovered tracks → CAF trackId mapping

    const shakaOk = (typeof shaka !== 'undefined') && shaka.Player && shaka.Player.isBrowserSupported && shaka.Player.isBrowserSupported();
    log(shakaOk ? ('Shaka ' + shaka.Player.version + ' available') : 'Shaka NOT available — native only', shakaOk ? null : 'err');

    async function ensurePlayer(){
      if (!player){ shaka.polyfill.installAll(); player = new shaka.Player();
        player.addEventListener('error', e => {
          const er = e.detail || {}; log('Shaka error '+er.code+' '+(er.data&&er.data[0]), 'err');
          toSenders({ type:'error', shaka: er.code, detail: String(er.data&&er.data[0]) });
        });
      }
      if (!attached){ await player.attach(video); attached = true; }
      return player;
    }
    function isAdaptive(url, ct){
      ct = (ct||'').toLowerCase(); url = url||'';
      return ct.indexOf('mpegurl')>=0 || ct.indexOf('m3u8')>=0 || ct.indexOf('dash')>=0 ||
             ct.indexOf('mpd')>=0 || /\.m3u8|\.mpd/i.test(url);
    }
    function mimeFor(url, ct){
      ct = (ct||'').toLowerCase();
      if (ct.indexOf('mpegurl')>=0 || /\.m3u8/i.test(url)) return 'application/x-mpegurl';
      if (ct.indexOf('dash')>=0 || ct.indexOf('mpd')>=0 || /\.mpd/i.test(url)) return 'application/dash+xml';
      return undefined;
    }

    function discoverTracks(){
      audioList = []; textList = [];
      try {
        const vs = player.getVariantTracks() || [];
        const seen = new Set();
        for (const v of vs){
          const key = (v.language||'und') + '|' + (v.channelsCount||0) + '|' + (v.audioRoles||[]).join(',');
          if (seen.has(key)) continue; seen.add(key);
          audioList.push({ lang: v.language||'und', ch: v.channelsCount||0,
                           label: v.label || v.originalAudioId || v.language || ('Audio '+(audioList.length+1)) });
        }
        const ts = player.getTextTracks() || [];
        const seenT = new Set();
        for (const t of ts){
          const key = (t.language||'und') + '|' + (t.label||'');
          if (seenT.has(key)) continue; seenT.add(key);
          textList.push({ lang: t.language||'und', label: t.label || t.language || ('Sub '+(textList.length+1)) });
        }
      } catch(e){ log('discoverTracks err '+e, 'err'); }
      log('tracks: audio=[' + audioList.map(a=>a.lang+'/'+a.ch+'ch').join(', ') +
          '] text=[' + textList.map(t=>t.lang).join(', ') + ']');
    }
    function buildCafTracks(){
      const arr = []; let id = 1;
      audioList.forEach(a => { const tk = new M.Track(id, TT.AUDIO); tk.language=a.lang;
        tk.name=a.label+(a.ch?(' ('+a.ch+'ch)'):''); a.tid=id; arr.push(tk); id++; });
      textList.forEach(t => { const tk = new M.Track(id, TT.TEXT); tk.language=t.lang;
        tk.name=t.label; tk.subtype=TX.SUBTITLES; t.tid=id; arr.push(tk); id++; });
      return arr;
    }

    // ── LOAD: route to Shaka (adaptive) or native <video> (progressive) ───────
    pm.setMessageInterceptor(MT.LOAD, async (req) => {
      try {
        const m = req.media || {}; const url = m.contentUrl || m.contentId || m.entity || '';
        const ct = m.contentType || '';
        log('LOAD ' + ct + '  ' + url);
        const startAt = (typeof req.currentTime === 'number' && req.currentTime > 0) ? req.currentTime : null;

        if (shakaOk && isAdaptive(url, ct)) {
          usingShaka = true; await ensurePlayer();
          try { await player.unload(); } catch(e){}
          await player.load(url, startAt, mimeFor(url, ct));
          discoverTracks();
          const tks = buildCafTracks();
          if (tks.length) { m.tracks = tks; m.duration = video.duration || m.duration; }
          // honour requested audio/text if the sender already asked for some
          if (req.activeTrackIds && req.activeTrackIds.length) applyTracks(req.activeTrackIds);
        } else {
          usingShaka = false;
          if (player && attached) { try { await player.unload(); } catch(e){} }
          video.src = url; if (startAt) { try { video.currentTime = startAt; } catch(e){} }
        }
        try { await video.play(); } catch(e){}
        log('playing (' + (usingShaka?'shaka':'native') + ')');
        return req;
      } catch (e) {
        log('LOAD failed: ' + (e && (e.message||e.code) || e), 'err');
        toSenders({ type:'error', reason: String(e && (e.message||e.code) || e) });
        throw e;   // → CAF reports LOAD_FAILED to the sender
      }
    });

    function applyTracks(ids){
      if (!usingShaka || !player) return;
      try {
        const a = audioList.find(x => ids.indexOf(x.tid) >= 0);
        if (a) { player.selectAudioLanguage(a.lang, undefined, a.ch || undefined); log(' → audio '+a.lang+'/'+a.ch+'ch'); }
        const t = textList.find(x => ids.indexOf(x.tid) >= 0);
        if (t) { player.selectTextLanguage(t.lang); player.setTextTrackVisibility(true); log(' → text '+t.lang); }
        else   { player.setTextTrackVisibility(false); }
      } catch(e){ log('applyTracks err '+e, 'err'); }
    }
    pm.setMessageInterceptor(MT.EDIT_TRACKS_INFO, (req) => {
      const ids = req.activeTrackIds || [];
      log('EDIT_TRACKS active=[' + ids.join(',') + ']');
      applyTracks(ids);
      return req;
    });

    // ── Transport (we own the element, so apply directly) ─────────────────────
    pm.setMessageInterceptor(MT.PLAY,  r => { video.play().catch(()=>{}); return r; });
    pm.setMessageInterceptor(MT.PAUSE, r => { video.pause(); return r; });
    pm.setMessageInterceptor(MT.SEEK,  r => { if (typeof r.currentTime === 'number') { try { video.currentTime = r.currentTime; } catch(e){} } return r; });
    pm.setMessageInterceptor(MT.STOP,  r => { try { video.pause(); } catch(e){} if (player) player.unload().catch(()=>{}); return r; });

    function curAudio(){ try { return (player.getVariantTracks()||[]).find(v=>v.active); } catch(e){ return null; } }
    function updateOverlay(){
      const a = usingShaka ? curAudio() : null;
      statusLine = 'state=' + (video.paused?'PAUSED':'PLAYING') + '  t=' + Math.round(video.currentTime||0) + 's' +
        (a ? ('  audio=' + (a.language||'und') + '/' + (a.channelsCount||0) + 'ch') : '');
      render();
    }
    ['playing','pause','seeked','timeupdate','ended','loadedmetadata','waiting'].forEach(ev =>
      video.addEventListener(ev, () => { try { pm.broadcastStatus(true); } catch(e){} updateOverlay(); }));
    video.addEventListener('error', () => log('video element error ' + (video.error && video.error.code), 'err'));

    // ── Capability probe (receiver-side device-capability feature) ────────────
    function probeCaps(){
      const want = [['H.264 1080p','video/mp4','avc1.640028',1920,1080],['H.264 4K','video/mp4','avc1.640033',3840,2160],
        ['HEVC','video/mp4','hev1.1.6.L93.B0',1920,1080],['VP9','video/webm','vp9',1920,1080],['AV1','video/mp4','av01.0.04M.08',1920,1080],
        ['AAC','audio/mp4','mp4a.40.2'],['AC-3','audio/mp4','ac-3'],['E-AC-3','audio/mp4','ec-3'],['Opus','audio/webm','opus'],['FLAC','audio/mp4','flac']];
      const caps = {}; for (const [n,mm,cc,w,h] of want){ let ok=false; try{ ok=context.canDisplayType(mm,cc,w||undefined,h||undefined);}catch(e){} caps[n]=ok; }
      log('caps: ' + Object.keys(caps).filter(k=>caps[k]).join(', '));
      let dev=null,dev2=null; try{ if(context.getDeviceCapabilities) dev=context.getDeviceCapabilities(); }catch(e){}
      try{ if(context.getDeviceInformation) dev2=context.getDeviceInformation(); }catch(e){}
      toSenders({ type:'capabilities', codecs:caps, device:dev, deviceInfo:dev2 });
    }
    context.addCustomMessageListener(NS, ev => {
      const d = ev.data || {}; log('msg ◄ ' + JSON.stringify(d));
      if (d.type==='debug') { debugOn=!!d.on; render(); }
      if (d.type==='getCaps') probeCaps();
    });

    // ── Start (custom player: skip CAF's built-in players) ────────────────────
    const options = new cast.framework.CastReceiverOptions();
    options.skipPlayersLoad = true;       // we drive Shaka / the <video> ourselves
    options.disableIdleTimeout = true;    // stay alive while testing
    options.customNamespaces = {}; options.customNamespaces[NS] = cast.framework.system.MessageType.JSON;
    context.addEventListener(cast.framework.system.EventType.READY, () => { log('READY — custom Shaka player', 'hd'); probeCaps(); });
    log('starting context…');
    context.start(options);
  })();
  </script>
</body>
</html>
