<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Cast Receiver</title>

  <!--
    Custom Web Receiver for CastTry — CAF + Shaka (useShakaForHls) so multi-track fMP4 HLS plays +
    LIVE-switches audio/subtitle. Registered against app id 9BDEDD6A; hosted on GitHub Pages.

    2026-06-01: Test A proved the SAME cinderella-2aud-2sub-hls (fMP4 .m4s, demuxed 2-aud/2-sub)
    plays + LIVE-switches in recent Shaka on all 4 browser players (Vega/Fire/Samsung/LG). The
    earlier 2026-05-31 CC failure (905/321 LOAD_FAILED on the Ultra) was almost certainly the OLD
    Shaka the device's CAF bundled: useShakaForHls was set but shakaVersion was NOT, so it used the
    device default. Per CAF docs the opt-in should pin a Shaka >= 4.15.35. Mixed content is NOT the
    blocker (the Default receiver already plays our HTTP HLS — see README). FIX A (this build): pin
    options.shakaVersion = '4.15.35'. If this STILL fails, FIX B = manual shaka.Player in the LOAD
    interceptor (CDN-pinned 4.15.x + NetworkingEngine request filters), per the open-cast-receiver
    template (https://github.com/JtdeGraaf/open-cast-receiver) — gives full version/filter control.

    DEBUG build: on-TV overlay (top-left) shows build tag / READY / LOAD / errors / state + a short
    scrolling log so hardware tests aren't blind. Set DEBUG=false (or strip #dbg) for production.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    cast-media-player { position: absolute; inset: 0; width: 100%; height: 100%; }
    /* Idle screen: centered cast glyph on black (no text). Shown when idle, hidden while playing. */
    #idle {
      position: absolute; inset: 0; z-index: 9990;
      background: #000
        url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dddddd'><path d='M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z'/></svg>")
        center center / 13vmin no-repeat;
    }
    #idle.hidden { display: none; }
    /* DEBUG overlay — top-left, monospace, semi-transparent. Above everything. */
    #dbg {
      position: absolute; left: 1.5vmin; top: 1.5vmin; z-index: 10000;
      max-width: 70vw; max-height: 60vh; overflow: hidden;
      font: 2.2vmin/1.35 monospace; color: #0f0; white-space: pre-wrap;
      background: rgba(0,0,0,0.55); padding: 1vmin 1.5vmin; border-radius: 0.8vmin;
      text-shadow: 0 0 2px #000;
    }
    #dbg.hidden { display: none; }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="idle"></div>
  <div id="dbg">receiver: booting…</div>

  <script>
  (function () {
    'use strict';
    const DEBUG = true;                         // ← on-TV overlay; set false for production
    const BUILD = 'v3-shaka4.15-2026-06-01';
    const NS = 'urn:x-cast:com.casttry.cast';
    const idleEl = document.getElementById('idle');
    const dbgEl  = document.getElementById('dbg');
    function showIdle(v) { idleEl.classList.toggle('hidden', !v); }

    // Overlay log — keeps the last ~14 lines.
    const lines = [];
    function dlog(m) {
      try { console.log('[Receiver] ' + m); } catch (e) {}
      if (!DEBUG || !dbgEl) return;
      lines.push(m); while (lines.length > 14) lines.shift();
      dbgEl.textContent = 'build: ' + BUILD + '\n' + lines.join('\n');
    }
    if (!DEBUG && dbgEl) dbgEl.classList.add('hidden');

    // Guard: if the SDK script failed to load, cast.framework is undefined — say so
    // on-screen instead of failing silently.
    if (typeof cast === 'undefined' || !cast.framework) {
      if (dbgEl) dbgEl.textContent = 'build: ' + BUILD + '\nFATAL: CAF SDK did not load (script blocked / URL dead)';
      return;
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const pm = context.getPlayerManager();
    const M = cast.framework.messages, E = cast.framework.events.EventType;
    function toSenders(o) { try { context.sendCustomMessage(NS, undefined, o); } catch (e) {} }
    try { context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG); } catch (e) {}

    // LOAD interceptor — pass the request through unchanged (CAF built-in player handles it).
    pm.setMessageInterceptor(M.MessageType.LOAD, req => {
      showIdle(false);
      try {
        const m = req.media || {};
        dlog('LOAD ct=' + (m.contentType || '?') + ' url=' + String(m.contentUrl || m.contentId || '').slice(-48));
      } catch (e) {}
      return req;
    });
    pm.addEventListener(E.PLAYER_LOAD_COMPLETE, () => {
      showIdle(false);
      let n = 0; try { n = (((pm.getMediaInformation() || {}).tracks) || []).length; } catch (e) {}
      dlog('LOAD_COMPLETE tracks=' + n);
    });
    pm.addEventListener(E.MEDIA_FINISHED, () => { dlog('MEDIA_FINISHED'); showIdle(true); });
    pm.addEventListener(E.MEDIA_STATUS, () => { try { if (pm.getPlayerState() === 'IDLE') showIdle(true); } catch (e) {} });
    pm.addEventListener(E.ERROR, e => {
      dlog('ERROR code=' + e.detailedErrorCode + ' reason=' + (e.error && (e.error.reason || e.error.type) || '?'));
      toSenders({ type: 'error', detailedErrorCode: e.detailedErrorCode, reason: e.error && (e.error.reason || e.error.type) });
    });

    // Receiver-side codec capability probe (relayed to the sender; no UI).
    function probeCaps() {
      const want = [['H.264 1080p','video/mp4','avc1.640028',1920,1080],['H.264 4K','video/mp4','avc1.640033',3840,2160],
        ['HEVC','video/mp4','hev1.1.6.L93.B0',1920,1080],['VP9','video/webm','vp9',1920,1080],['AV1','video/mp4','av01.0.04M.08',1920,1080],
        ['AAC','audio/mp4','mp4a.40.2'],['AC-3','audio/mp4','ac-3'],['E-AC-3','audio/mp4','ec-3'],['Opus','audio/webm','opus'],['FLAC','audio/mp4','flac']];
      const caps = {}; for (const a of want) { let ok = false; try { ok = context.canDisplayType(a[1], a[2], a[3] || undefined, a[4] || undefined); } catch (e) {} caps[a[0]] = ok; }
      let dev = null, dev2 = null; try { if (context.getDeviceCapabilities) dev = context.getDeviceCapabilities(); } catch (e) {}
      try { if (context.getDeviceInformation) dev2 = context.getDeviceInformation(); } catch (e) {}
      toSenders({ type: 'capabilities', codecs: caps, device: dev, deviceInfo: dev2 });
    }
    context.addCustomMessageListener(NS, ev => { const d = ev.data || {}; if (d.type === 'getCaps') probeCaps(); });

    const options = new cast.framework.CastReceiverOptions();
    options.useShakaForHls = true;
    // Pin a recent Shaka for HLS. CAF >= 3.0.0105 honours this; without it the device used its
    // OLD bundled Shaka → the 2026-05-31 demuxed-HLS LOAD_FAILED. Docs: pin >= 4.15.35.
    options.shakaVersion = '4.15.35';
    options.customNamespaces = {}; options.customNamespaces[NS] = cast.framework.system.MessageType.JSON;
    context.addEventListener(cast.framework.system.EventType.READY, () => { showIdle(true); dlog('READY (useShakaForHls=true, shaka=4.15.35)'); probeCaps(); });
    dlog('starting context…');
    context.start(options);
  })();
  </script>
</body>
</html>
