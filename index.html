<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Cast Receiver</title>

  <!--
    Custom Web Receiver for CastTry — CAF built-in player + Shaka (useShakaForHls) so demuxed
    multi-audio HLS plays + switches. Registered against app id 9BDEDD6A; hosted on GitHub Pages.
    UI: behaves like the Default Media Receiver — a centered cast glyph on black when no media is
    loaded, the video while playing. NO debug overlay / no on-screen text. Diagnostics go to the
    JS console (chrome://inspect) + the urn:x-cast:com.casttry.cast namespace (sender-side only).
    Preview SDK for newest Shaka (testing); revert to /v3/ for production.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/preview/cast_receiver_framework.js"></script>

  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    cast-media-player { position: absolute; inset: 0; width: 100%; height: 100%; }
    /* Idle screen: centered cast glyph on black (no text). Shown when idle, hidden while playing. */
    #idle {
      position: absolute; inset: 0; z-index: 9999;
      background: #000
        url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dddddd'><path d='M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z'/></svg>")
        center center / 13vmin no-repeat;
    }
    #idle.hidden { display: none; }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>
  <div id="idle"></div>

  <script>
  (function () {
    'use strict';
    const NS = 'urn:x-cast:com.casttry.cast';
    const idleEl = document.getElementById('idle');
    function showIdle(v) { idleEl.classList.toggle('hidden', !v); }
    function log(m) { try { console.log('[Receiver] ' + m); } catch (e) {} }

    const context = cast.framework.CastReceiverContext.getInstance();
    const pm = context.getPlayerManager();
    const M = cast.framework.messages, E = cast.framework.events.EventType;
    function toSenders(o) { try { context.sendCustomMessage(NS, undefined, o); } catch (e) {} }
    try { context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG); } catch (e) {}

    // Idle-screen control: hide on load, show again when idle/finished.
    pm.setMessageInterceptor(M.MessageType.LOAD, req => {
      showIdle(false);
      try { const m = req.media || {}; log('LOAD ' + (m.contentType || '') + ' ' + (m.contentId || m.contentUrl || '')); } catch (e) {}
      return req;
    });
    pm.addEventListener(E.PLAYER_LOAD_COMPLETE, () => { showIdle(false); log('LOAD complete tracks=' + (((pm.getMediaInformation() || {}).tracks) || []).length); });
    pm.addEventListener(E.MEDIA_FINISHED, () => showIdle(true));
    pm.addEventListener(E.MEDIA_STATUS, () => { try { if (pm.getPlayerState() === 'IDLE') showIdle(true); } catch (e) {} });
    pm.addEventListener(E.ERROR, e => { log('ERROR ' + e.detailedErrorCode); toSenders({ type: 'error', detailedErrorCode: e.detailedErrorCode, reason: e.error && (e.error.reason || e.error.type) }); });

    // Receiver-side codec capability probe (relayed to the sender; no UI).
    function probeCaps() {
      const want = [['H.264 1080p','video/mp4','avc1.640028',1920,1080],['H.264 4K','video/mp4','avc1.640033',3840,2160],
        ['HEVC','video/mp4','hev1.1.6.L93.B0',1920,1080],['VP9','video/webm','vp9',1920,1080],['AV1','video/mp4','av01.0.04M.08',1920,1080],
        ['AAC','audio/mp4','mp4a.40.2'],['AC-3','audio/mp4','ac-3'],['E-AC-3','audio/mp4','ec-3'],['Opus','audio/webm','opus'],['FLAC','audio/mp4','flac']];
      const caps = {}; for (const a of want) { let ok = false; try { ok = context.canDisplayType(a[1], a[2], a[3] || undefined, a[4] || undefined); } catch (e) {} caps[a[0]] = ok; }
      let dev = null, dev2 = null; try { if (context.getDeviceCapabilities) dev = context.getDeviceCapabilities(); } catch (e) {}
      try { if (context.getDeviceInformation) dev2 = context.getDeviceInformation(); } catch (e) {}
      toSenders({ type: 'capabilities', codecs: caps, device: dev, deviceInfo: dev2 });
    }
    context.addCustomMessageListener(NS, ev => { const d = ev.data || {}; if (d.type === 'getCaps') probeCaps(); });

    const options = new cast.framework.CastReceiverOptions();
    options.useShakaForHls = true;
    options.customNamespaces = {}; options.customNamespaces[NS] = cast.framework.system.MessageType.JSON;
    context.addEventListener(cast.framework.system.EventType.READY, () => { showIdle(true); log('READY'); probeCaps(); });
    context.start(options);
  })();
  </script>
</body>
</html>
