<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Casting Receiver">
  <!-- Casting Receiver mark: a sharp two-tone cast glyph (white screen frame + red signal waves)
       on a dark rounded tile with a thin accent border. Matches the Roku receiver's #0a0a0c / #FF465B
       identity. Source of truth for the inline idle-screen hero and the Cast-dialog icon.png. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c25"/>
      <stop offset="1" stop-color="#0e0e13"/>
    </linearGradient>
  </defs>
  <rect x="11" y="11" width="490" height="490" rx="116" fill="url(#tile)" stroke="#FF465B" stroke-width="6"/>
  <g transform="translate(123,130) scale(11)">
    <path fill="#f5f5f7" d="M21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
    <path fill="#FF465B" d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11z"/>
  </g>
</svg>
